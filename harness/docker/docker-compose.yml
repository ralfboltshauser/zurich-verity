services:
  verity-runner:
    build:
      context: ../..
      dockerfile: harness/docker/Dockerfile
    working_dir: /workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      VERITY_SCOPE: /workspace/harness/policies/scope.allowlist.example
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
    volumes:
      - ../..:/workspace
    networks:
      - verity-lab

networks:
  verity-lab:
    driver: bridge
