name: Zurich Verity PR review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pull_number:
        description: Pull request number to review
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: zurich-verity-pr-${{ github.event.pull_request.number || inputs.pull_number }}
  cancel-in-progress: false

jobs:
  verity:
    if: ${{ github.event_name == 'workflow_dispatch' || !github.event.pull_request.draft }}
    runs-on: [self-hosted, linux, x64, zurich-verity-demo]
    steps:
      - name: Run Zurich Verity Smithers workflow on Ubuntu host
        env:
          PULL_NUMBER: ${{ github.event.pull_request.number || inputs.pull_number }}
          GITHUB_TOKEN: ${{ github.token }}
          REVIEW_GITHUB_TOKEN: ${{ secrets.SMITHERS_REVIEW_TOKEN }}
        run: |
          set -euo pipefail
          export PATH="/home/ralf/.bun/bin:${PATH}"
          if [ -z "${REVIEW_GITHUB_TOKEN:-}" ]; then
            REVIEW_GITHUB_TOKEN="$(env -u GITHUB_TOKEN -u GH_TOKEN gh auth token)"
            export REVIEW_GITHUB_TOKEN
          fi

          SOURCE_DIR="/home/ralf/prj/exploration/zurich-verity-demo"
          RUN_DIR="/tmp/zurich-verity-actions/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          rm -rf "${RUN_DIR}"
          mkdir -p "$(dirname "${RUN_DIR}")"

          GIT_CLONE_TOKEN="${REVIEW_GITHUB_TOKEN:-${GITHUB_TOKEN:-}}"
          ASKPASS_PATH="/tmp/git-askpass-verity-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.sh"
          printf '%s\n' '#!/bin/sh' 'case "$1" in' '  *Username*) echo "x-access-token" ;;' '  *Password*) echo "$GIT_CLONE_TOKEN" ;;' 'esac' > "${ASKPASS_PATH}"
          chmod 700 "${ASKPASS_PATH}"
          env GIT_CLONE_TOKEN="${GIT_CLONE_TOKEN}" GIT_ASKPASS="${ASKPASS_PATH}" GIT_TERMINAL_PROMPT=0 git clone --no-tags --branch main "https://github.com/${GITHUB_REPOSITORY}.git" "${RUN_DIR}"
          cd "${RUN_DIR}"
          env GIT_CLONE_TOKEN="${GIT_CLONE_TOKEN}" GIT_ASKPASS="${ASKPASS_PATH}" GIT_TERMINAL_PROMPT=0 git fetch origin "refs/pull/${PULL_NUMBER}/head:verity-pr-${PULL_NUMBER}"
          rm -f "${ASKPASS_PATH}"
          git checkout "verity-pr-${PULL_NUMBER}"

          if [ -d "${SOURCE_DIR}/.smithers/node_modules" ] && [ ! -e .smithers/node_modules ]; then
            ln -s "${SOURCE_DIR}/.smithers/node_modules" .smithers/node_modules
          elif [ ! -e .smithers/node_modules ]; then
            (cd .smithers && bun install --frozen-lockfile)
          fi

          IMAGE_HASH="$(sha256sum docker/smithers-codex/Dockerfile docker/smithers-codex/run-child.sh | sha256sum | cut -c1-12)"
          IMAGE_TAG="zurich-verity-smithers-codex:${IMAGE_HASH}"
          if ! docker image inspect "${IMAGE_TAG}" >/dev/null 2>&1; then
            docker build -t "${IMAGE_TAG}" -t zurich-verity-smithers-codex:latest docker/smithers-codex
          else
            docker tag "${IMAGE_TAG}" zurich-verity-smithers-codex:latest
            echo "Using cached Smithers Docker image ${IMAGE_TAG}"
          fi

          docker compose -f harness/docker/docker-compose.yml build

          WORKFLOW_INPUT="$(node - <<'NODE'
          const fs = require("node:fs");
          (async () => {
          const event = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, "utf8"));
          const repository = process.env.GITHUB_REPOSITORY;
          const pullNumber = Number(process.env.PULL_NUMBER);
          const token = process.env.GITHUB_TOKEN;
          let pr = event.pull_request ?? null;

          if (!repository || !pullNumber) {
            throw new Error("GITHUB_REPOSITORY and PULL_NUMBER are required.");
          }

          if (!pr || pr.number !== pullNumber) {
            const response = await fetch(`https://api.github.com/repos/${repository}/pulls/${pullNumber}`, {
              headers: {
                Accept: "application/vnd.github+json",
                Authorization: `Bearer ${token}`,
                "X-GitHub-Api-Version": "2022-11-28",
              },
            });
            if (!response.ok) {
              throw new Error(`PR lookup failed: ${response.status} ${await response.text()}`);
            }
            pr = await response.json();
          }

          if (pr.state !== "open" || pr.draft) {
            process.stdout.write("");
            return;
          }

          const input = {
            repository,
            pullNumber: pr.number,
            pullTitle: pr.title,
            pullBody: pr.body ?? "",
            baseRef: pr.base.ref,
            headRef: pr.head.ref,
            headSha: pr.head.sha,
          };
          process.stdout.write(JSON.stringify(input));
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
          )"

          if [ -z "${WORKFLOW_INPUT}" ]; then
            echo "PR is closed, merged, or draft; skipping Verity review."
            exit 0
          fi

          bun .smithers/node_modules/.bin/smithers workflow run verity-pr-review \
            --input "${WORKFLOW_INPUT}" \
            --annotations '{"source":"github-actions","event":"pull_request"}'

      - name: Post Verity PR comment and apply remediation
        env:
          GH_TOKEN: ${{ github.token }}
          REVIEW_GITHUB_TOKEN: ${{ secrets.SMITHERS_REVIEW_TOKEN }}
          PULL_NUMBER: ${{ github.event.pull_request.number || inputs.pull_number }}
        run: |
          set -euo pipefail
          export PATH="/home/ralf/.bun/bin:${PATH}"
          if [ -z "${REVIEW_GITHUB_TOKEN:-}" ]; then
            REVIEW_GITHUB_TOKEN="$(env -u GITHUB_TOKEN -u GH_TOKEN gh auth token)"
            export REVIEW_GITHUB_TOKEN
          fi
          RUN_DIR="/tmp/zurich-verity-actions/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          cd "${RUN_DIR}"
          gh pr comment "$PULL_NUMBER" --body-file .verity/pr-comment.md

          if [ ! -f .verity/finding.md ]; then
            echo "No blocking finding; no remediation commit needed."
            exit 0
          fi

          ./harness/scripts/apply-verity-fix.sh
          if git diff --quiet; then
            echo "No remediation diff produced."
            exit 0
          fi

          git config user.name "Zurich Verity"
          git config user.email "verity-bot@users.noreply.github.com"
          git add demo_app/app.py
          git commit -m "fix: remove unauthenticated debug data exposure"
          GIT_PUSH_TOKEN="${REVIEW_GITHUB_TOKEN:-${GH_TOKEN:-}}"
          ASKPASS_PATH="/tmp/git-askpass-verity-push-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.sh"
          printf '%s\n' '#!/bin/sh' 'case "$1" in' '  *Username*) echo "x-access-token" ;;' '  *Password*) echo "$GIT_PUSH_TOKEN" ;;' 'esac' > "${ASKPASS_PATH}"
          chmod 700 "${ASKPASS_PATH}"
          HEAD_REF="$(node -e 'const fs=require("node:fs"); const e=JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, "utf8")); console.log(e.pull_request.head.ref)')"
          env GIT_PUSH_TOKEN="${GIT_PUSH_TOKEN}" GIT_ASKPASS="${ASKPASS_PATH}" GIT_TERMINAL_PROMPT=0 git push origin "HEAD:${HEAD_REF}"
          rm -f "${ASKPASS_PATH}"

      - name: Fail until vulnerable code is remediated
        run: |
          RUN_DIR="/tmp/zurich-verity-actions/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          cd "${RUN_DIR}"
          if [ -f .verity/finding.md ]; then
            echo "Verity found a blocking security issue. Review the PR comment for proof and remediation guidance."
            exit 1
          fi
          echo "Verity review passed."
